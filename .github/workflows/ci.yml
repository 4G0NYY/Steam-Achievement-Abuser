name: CI

# Build-check on every push / PR to master so breakage is caught before tagging.
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build "src/Steam Achievement Abuser/Steam Achievement Abuser.csproj" -c Release
